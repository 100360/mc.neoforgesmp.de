/* PARTICLES */
#particles{

to{ text-shadow:0 0 25px #00eaff; }
}

.server-box{
display:inline-block;
background:rgba(20,20,50,0.9);

.join-btn:hover{

box-shadow:0 0 20px #00eaff;
}

.music-btn{

color:#00eaff;
border:1px solid #00eaff;
}

/* CLANS */
.clans{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:20px;
}

.clan{
width:260px;
background:rgba(20,20,50,0.9);
padding:15px;
border-radius:10px;
transition:0.3s;
}

.clan:hover{transform:scale(1.05);}

.members{
font-size:13px;
margin-top:6px;
color:#ccc;
}

/* RESPONSIVE */
@media(max-width:768px){
.hero h1{font-size:24px;}
.clan{width:90%;}
}
</style>

<script>
function copyIP(){

/* MUSIC FIX */
// const music=document.getElementById("bgMusic");

// music.play();
// }else{
// music.pause();

/* SERVER STATUS */
async function loadServer(){
const serverIP="mc.robinreinecke.de";
try{
const res=await fetch("https://api.mcsrvstat.us/2/"+serverIP);
const data=await res.json();
if(data.online){
document.getElementById("status").innerHTML="Online";
document.getElementById("status").className="status-online";
document.getElementById("players").innerText=data.players.online+" / "+data.players.max;
}else{
document.getElementById("status").innerHTML="Offline";
document.getElementById("status").className="status-offline";
}
}catch{
document.getElementById("status").innerHTML="Fehler";
}
}
loadServer();
setInterval(loadServer,30000);

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#7a5cff";
ctx.fill();
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});
requestAnimationFrame(animate);
}
animate();
</script>
